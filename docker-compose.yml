services:
  api:
    image: node:22-alpine
    container_name: flowpilot-api
    working_dir: /workspace
    command:
      - sh
      - -c
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @flowpilot/contracts build && pnpm --filter @flowpilot/api prisma:generate && pnpm --filter @flowpilot/api dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      API_HOST: 0.0.0.0
      API_PORT: 3000
      CORS_ORIGIN: "*"
      DATABASE_URL: postgresql://flowpilot:flowpilot@postgres:5432/flowpilot
      RABBITMQ_URL: amqp://flowpilot:flowpilot@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      JWT_SECRET: replace-with-local-development-secret
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - api-app-node-modules:/workspace/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  execution-worker:
    image: node:22-alpine
    container_name: flowpilot-execution-worker
    working_dir: /workspace
    command:
      - sh
      - -c
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @flowpilot/contracts build && pnpm --filter @flowpilot/api prisma:generate && pnpm --filter @flowpilot/execution-worker dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://flowpilot:flowpilot@postgres:5432/flowpilot
      RABBITMQ_URL: amqp://flowpilot:flowpilot@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      FLOWPILOT_ENABLE_WORKER_FAILURE_SIMULATION: ${FLOWPILOT_ENABLE_WORKER_FAILURE_SIMULATION:-false}
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - execution-worker-node-modules:/workspace/apps/execution-worker/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  workflow-service:
    image: node:22-alpine
    container_name: flowpilot-workflow-service
    working_dir: /workspace
    command:
      - sh
      - -c
      - corepack enable && pnpm install --frozen-lockfile && pnpm --filter @flowpilot/contracts build && pnpm --filter @flowpilot/api prisma:generate && pnpm --filter @flowpilot/workflow-service dev
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: postgresql://flowpilot:flowpilot@postgres:5432/flowpilot
      RABBITMQ_URL: amqp://flowpilot:flowpilot@rabbitmq:5672
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - workflow-service-node-modules:/workspace/apps/workflow-service/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    environment:
      POSTGRES_DB: flowpilot
      POSTGRES_USER: flowpilot
      POSTGRES_PASSWORD: flowpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpilot -d flowpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: flowpilot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: flowpilot
      RABBITMQ_DEFAULT_PASS: flowpilot
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowpilot-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: flowpilot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  api-node-modules:
  api-app-node-modules:
  execution-worker-node-modules:
  workflow-service-node-modules:
  postgres-data:
  rabbitmq-data:
  redis-data:
  qdrant-data:
